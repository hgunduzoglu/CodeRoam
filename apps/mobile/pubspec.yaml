name: coderoam
description: Touch-first remote engineering workspace.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  coderoam_protocol:
    path: ../../protocol/gen/dart
  flutter_secure_storage: ^9.2.4
  go_router: ^15.0.0
  flutter_riverpod: ^3.0.0
  webview_flutter: ^4.10.0
  web_socket_channel: ^3.0.2
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/editor/
    - assets/terminal/
