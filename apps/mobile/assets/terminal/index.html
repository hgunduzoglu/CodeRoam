<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <title>CodeRoam Terminal</title>

    <link rel="stylesheet" href="./style.css" />

    <style>
      html,
      body,
      #terminal {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        overscroll-behavior: none;
        background: #0d0f12;
        color: white;
      }

      #boot-status {
        padding: 24px;
        font-family: system-ui, sans-serif;
      }

      #terminal {
        position: relative;
      }

      .terminal-touch-selection-toolbar {
        position: absolute;
        z-index: 30;
        top: max(8px, env(safe-area-inset-top));
        right: max(8px, env(safe-area-inset-right));
        display: flex;
        gap: 8px;
        padding: 6px;
        border: 1px solid #475467;
        border-radius: 12px;
        background: #202735;
        box-shadow: 0 4px 16px rgb(0 0 0 / 40%);
        user-select: none;
        -webkit-user-select: none;
      }

      .terminal-touch-selection-toolbar[hidden] {
        display: none;
      }

      .terminal-touch-selection-toolbar button {
        min-width: 64px;
        min-height: 48px;
        border: 1px solid #667085;
        border-radius: 8px;
        padding: 0 14px;
        background: #344054;
        color: #ffffff;
        font:
          600 15px system-ui,
          sans-serif;
      }
    </style>

    <script>
      (() => {
        const send = (payload) => {
          try {
            window.CodeRoamTerminal?.postMessage(JSON.stringify(payload));
          } catch (_) {}
        };

        window.addEventListener("error", (event) => {
          send({
            version: 1,
            type: "terminal.error",
            payload: {
              message: event.message,
              line: event.lineno,
              column: event.colno,
            },
          });
        });

        window.addEventListener("unhandledrejection", (event) => {
          send({
            version: 1,
            type: "terminal.error",
            payload: {
              message: "Unhandled terminal promise rejection.",
            },
          });
        });
      })();
    </script>
  </head>

  <body>
    <div id="terminal">
      <div id="boot-status">Starting CodeRoam terminal…</div>
    </div>

    <script defer src="./app.js"></script>
  </body>
</html>
