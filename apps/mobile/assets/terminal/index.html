<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <title>CodeRoam Terminal</title>

    <link rel="stylesheet" href="./style.css" />

    <style>
      html,
      body,
      #terminal {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        overscroll-behavior: none;
        background: #0d0f12;
        color: white;
      }

      #boot-status {
        padding: 24px;
        font-family: system-ui, sans-serif;
      }
    </style>

    <script>
      (() => {
        const send = (payload) => {
          try {
            window.CodeRoamTerminal?.postMessage(JSON.stringify(payload));
          } catch (_) {}
        };

        window.addEventListener("error", (event) => {
          send({
            version: 1,
            type: "terminal.error",
            payload: {
              message: event.message,
              line: event.lineno,
              column: event.colno,
            },
          });
        });

        window.addEventListener("unhandledrejection", (event) => {
          send({
            version: 1,
            type: "terminal.error",
            payload: {
              message: "Unhandled terminal promise rejection.",
            },
          });
        });
      })();
    </script>
  </head>

  <body>
    <div id="terminal">
      <div id="boot-status">Starting CodeRoam terminal…</div>
    </div>

    <script defer src="./app.js"></script>
  </body>
</html>
