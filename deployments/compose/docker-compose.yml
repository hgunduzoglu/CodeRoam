services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coderoam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - coderoam-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 2s

  control-plane:
    build:
      context: ../..
      dockerfile: deployments/docker/control-plane.Dockerfile
    environment:
      CONTROL_PLANE_HTTP_ADDR: :8080
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/coderoam?sslmode=disable
      RELAY_REGION: "${RELAY_REGION:?RELAY_REGION is required}"
      OIDC_ISSUER: "${OIDC_ISSUER:?OIDC_ISSUER is required}"
      OIDC_AUDIENCE: "${OIDC_AUDIENCE:?OIDC_AUDIENCE is required}"
      OIDC_JWKS_URL: "${OIDC_JWKS_URL:?OIDC_JWKS_URL is required}"
      OIDC_SIGNING_ALGORITHM: "${OIDC_SIGNING_ALGORITHM:?OIDC_SIGNING_ALGORITHM is required}"
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: deployments/docker/worker.Dockerfile
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/coderoam?sslmode=disable
      REDIS_ADDR: redis:6379
      WORKER_PROCESSING_ENABLED: "${WORKER_PROCESSING_ENABLED:-true}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  relay:
    build:
      context: ../..
      dockerfile: deployments/docker/relay.Dockerfile
    environment:
      RELAY_HTTP_ADDR: :8090
      RELAY_REGION: "${RELAY_REGION:?RELAY_REGION is required}"
      REDIS_ADDR: redis:6379
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  coderoam-postgres:
