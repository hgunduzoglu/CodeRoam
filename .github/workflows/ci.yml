name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: true
      - run: make fmt-go
      - run: git diff --exit-code
      - run: make lint-go
      - run: make test-go
      - run: make build-go

  webviews:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: make check-web

  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5
          cache: true
      - run: make check-flutter

  protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: true
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.3
      - uses: bufbuild/buf-action@v1
        with:
          version: 1.47.2
          setup_only: true
      - name: Ensure the compatibility baseline exists
        run: git show-ref --verify --quiet refs/heads/main || git branch main origin/main
      - run: make test-protocol
      - run: make proto-check

  infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: make test-infrastructure

  agent-guidance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/sync-agent-skills.py --check
