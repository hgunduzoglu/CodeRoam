name: Agent Guidance

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - "scripts/sync-agent-skills.py"
      - "docs/agent/**"
  push:
    branches: [main]
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - "scripts/sync-agent-skills.py"
      - "docs/agent/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/sync-agent-skills.py --check
